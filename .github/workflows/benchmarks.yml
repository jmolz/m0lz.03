name: Benchmarks

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/benchmarks.yml'
      - 'benchmarks/**'
      - 'src/config/**'
      - 'src/daemon/**'
      - 'src/identity/**'
      - 'src/interceptors/**'
      - 'src/pii/**'
      - 'src/proxy/**'
      - 'src/storage/**'
      - 'tests/fixtures/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'tsup.config.ts'
  schedule:
    - cron: '0 6 * * 0' # Sundays at 6am UTC

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm benchmark:quick
      - uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmarks/results/latest.json
      - uses: actions/upload-artifact@v7
        with:
          name: benchmark-charts
          path: benchmarks/charts/
